services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-brokerage_data}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Waits for PostgreSQL to be ready before starting dependent services
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - etl_network

  # ── ETL (on-demand run) ───────────────────────────────────────────────────
  etl:
    build: .
    container_name: etl
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-brokerage_data}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    networks:
      - etl_network
    volumes:
      - ${HOST_PWD}/data/input:/app/data/input:ro #Read-Only
    # Exits 0 after completing — restart: "no" is intentional for on-demand use
    restart: "no"

  # ── Scheduler (periodic runs, every 2 minutes) ────────────────────────────
  # Drop a new trades_YYYY-MM-DD.csv into data/input/ and the scheduler will
  # pick it up on the next tick without any manual intervention.
  scheduler:
    image: alpine:3.19
    container_name: scheduler
    depends_on:
      db:
        condition: service_healthy
    links:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_DB: ${POSTGRES_DB:-brokerage_data}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DB_MAX_RETRIES: 3
      DB_RETRY_DELAY: 5
    networks:
      - etl_network
    volumes:
      - ${HOST_PWD}/data/input:/app/data/input:ro #Read-Only
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_PWD}:/app
    command: sh /app/scheduler.sh
    restart: unless-stopped

  # ── pgAdmin (optional, visual query tool) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: brokerage_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_local_dev}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:

networks:
  etl_network:
    name: shared_etl_network
    driver: bridge

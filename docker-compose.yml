services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-brokerage_data}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Waits for PostgreSQL to be ready before starting dependent services
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ETL (on-demand run) ───────────────────────────────────────────────────
  etl:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-brokerage_data}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - ./data/input:/app/data/input:ro
    # Exits 0 after completing — restart: "no" is intentional for on-demand use
    restart: "no"

  # ── Scheduler (periodic runs, every 5 minutes) ────────────────────────────
  # Drop a new trades_YYYY-MM-DD.csv into data/input/ and the scheduler will
  # pick it up on the next tick without any manual intervention.
  scheduler:
    image: alpine:3.19
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/input:/app/data/input:ro #Read-Only
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app
    # Uses `docker run` against the already-built etl image so we do not
    # duplicate orchestration logic inside the container.
    # crond is Daemon (Background Process) that runs the scheduled tasks,
    # and keep it in foreground mode with `-f` to prevent the container from exiting.
    command: >
      sh -c "
        apk add --no-cache docker-cli &&
        echo '*/5 * * * * docker compose -f /app/docker-compose.yml run --rm etl >> /var/log/etl-cron.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    restart: unless-stopped

  # ── pgAdmin (optional, visual query tool) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: brokerage_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_local_dev}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
